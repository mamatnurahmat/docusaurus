version: '3.8'

services:
  docusaurus-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: docusaurus-dev
    ports:
      - "3000:3000"
    volumes:
      # Mount folder saat ini ke /app di container untuk hot-reload
      - .:/app
      # Gunakan volume terpisah untuk node_modules agar tidak tertimpa oleh local node_modules
      - /app/node_modules
      # Gunakan volume terpisah untuk .docusaurus (build cache)
      - /app/.docusaurus
    environment:
      - NODE_ENV=development
      # CHOKIDAR_USEPOLLING=true sangat membantu jika hot-reload tidak berjalan di beberapa OS (seperti WSL atau Docker Desktop)
      - CHOKIDAR_USEPOLLING=true
    stdin_open: true # Untuk mendukung interaktivitas jika diperlukan
    tty: true
    restart: always # Optional: otomatis restart jika container mati
